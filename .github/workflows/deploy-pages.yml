name: Deploy web demo to GitHub Pages

# SpendWise is a desktop (Electron) app, but its renderer also runs as a
# static, localStorage-backed web build. This workflow publishes that build
# as a live browser demo on GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress release.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Enable GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: npm ci

      - run: npm test

      - name: Build static web app
        # configure-pages exposes the correct base path (e.g.
        # /spendwise-desktop/) as steps.pages.outputs.base_path.
        run: npm run build:web
        env:
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
